name: Missive
description: >-
  Missive is a team inbox and collaboration platform that brings email, SMS,
  WhatsApp, Instagram, Facebook Messenger, and live chat into one unified
  workspace. It provides a REST API for managing conversations, messages,
  contacts, labels, drafts, analytics, and automation rules, enabling teams to
  integrate Missive into business workflows. The API supports webhooks for
  real-time event notifications, custom channels for integrating external
  communication sources, and UI/iFrame integrations via JavaScript. Developers
  can automate drafts, sync contacts, generate analytics reports, and build
  custom integrations with the platform.
