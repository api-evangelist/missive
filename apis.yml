apis:
  - name: Missive REST API
    description: >-
      The Missive REST API allows developers to manage conversations, messages,
      contacts, drafts, labels, and analytics programmatically. Authentication
      uses Bearer tokens (personal access tokens) generated in Missive
      preferences. The API base URL is https://public.missiveapp.com/v1/ and
      requires a Productive plan or higher to generate API tokens. Responses are
      JSON-formatted with HTTP 200 or 201 success codes.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
